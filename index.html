<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Magic Prompt Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Lexend', 'Noto Sans TC', sans-serif;
            background-color: #f0f9ff;
        }

        .custom-select-container {
            position: relative;
            /* 確保容器本身有層級意識 */
            z-index: 10;
        }

        /* 當容器內部的輸入框被聚焦時，提高該容器的層級 */
        .custom-select-container:focus-within {
            z-index: 50;
        }

        .dropdown-list {
            display: none;
            position: absolute;
            z-index: 100; /* 高於所有輸入框 */
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            background: white;
            border: 2px solid #3b82f6;
            border-radius: 0.75rem;
            margin-top: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .dropdown-list.show {
            display: block;
        }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 1.25rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background-color: #e0f2fe;
        }

        .category-card {
            transition: transform 0.2s;
            position: relative;
        }

        /* 這裡很關鍵：確保後面的卡片不會蓋過前面卡片的下拉選單 */
        .grid > div:nth-child(1) { z-index: 40; }
        .grid > div:nth-child(2) { z-index: 30; }
        .grid > div:nth-child(3) { z-index: 20; }
        .grid > div:nth-child(4) { z-index: 10; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold text-blue-600 mb-2">✨ AI Magic Prompt Builder ✨</h1>
            <p class="text-xl text-gray-600">Pick your favorite words to create amazing AI images!</p>
        </header>

        <!-- Main Interface -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            
            <!-- Category: WHO -->
            <div class="category-card bg-white p-6 rounded-2xl shadow-sm border-2 border-blue-100">
                <label class="block text-2xl font-bold text-blue-500 mb-3">👤 Who</label>
                <div class="custom-select-container" id="who-container">
                    <input type="text" id="who-input" placeholder="Search or type..." 
                        class="w-full text-xl p-4 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-400">
                    <div id="who-list" class="dropdown-list"></div>
                </div>
            </div>

            <!-- Category: WHERE -->
            <div class="category-card bg-white p-6 rounded-2xl shadow-sm border-2 border-green-100">
                <label class="block text-2xl font-bold text-green-500 mb-3">📍 Where</label>
                <div class="custom-select-container" id="where-container">
                    <input type="text" id="where-input" placeholder="Search or type..." 
                        class="w-full text-xl p-4 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-green-400">
                    <div id="where-list" class="dropdown-list"></div>
                </div>
            </div>

            <!-- Category: WHAT -->
            <div class="category-card bg-white p-6 rounded-2xl shadow-sm border-2 border-yellow-100">
                <label class="block text-2xl font-bold text-yellow-600 mb-3">🏃 What</label>
                <div class="custom-select-container" id="what-container">
                    <input type="text" id="what-input" placeholder="Search or type..." 
                        class="w-full text-xl p-4 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-yellow-400">
                    <div id="what-list" class="dropdown-list"></div>
                </div>
            </div>

            <!-- Category: STYLE -->
            <div class="category-card bg-white p-6 rounded-2xl shadow-sm border-2 border-purple-100">
                <label class="block text-2xl font-bold text-purple-500 mb-3">🎨 Style</label>
                <div class="custom-select-container" id="style-container">
                    <input type="text" id="style-input" placeholder="Search or type..." 
                        class="w-full text-xl p-4 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-purple-400">
                    <div id="style-list" class="dropdown-list"></div>
                </div>
            </div>

        </div>

        <!-- Output Section -->
        <div class="bg-blue-600 p-8 rounded-3xl text-white shadow-xl relative z-0">
            <h2 class="text-2xl font-bold mb-4 flex items-center">
                <span class="mr-2">📝</span> Magic Prompt
            </h2>
            <div id="prompt-output" class="bg-blue-700/50 p-6 rounded-xl text-3xl md:text-4xl min-h-[100px] mb-6 font-medium break-words border border-blue-400">
                Waiting for magic...
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4">
                <button onclick="copyPrompt()" class="flex-1 bg-white text-blue-600 text-2xl font-bold py-4 px-8 rounded-2xl hover:bg-blue-50 transition active:scale-95 flex justify-center items-center">
                    <span id="copy-btn-text">📋 Copy Prompt</span>
                </button>
                <button onclick="resetAll()" class="sm:w-1/4 bg-blue-500 text-white text-xl font-bold py-4 px-6 rounded-2xl hover:bg-blue-400 transition">
                    🔄 Reset
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-gray-500 pb-8">
            <p>A simple AI prompt tool for elementary students.</p>
        </footer>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-8 py-4 rounded-full text-xl hidden shadow-2xl z-[200]">
        Copied to clipboard!
    </div>

    <script>
        const data = {
            who: [
                {en: "adult"}, {en: "boy"}, {en: "child"}, 
                {en: "girl"}, {en: "Artist"}, {en: "Chef"}, 
                {en: "classmate"}, {en: "customer"}, {en: "doctor"}, 
                {en: "scientist"}, {en: "Singer"}, {en: "teacher"},
                {en: "hero"}, {en: "king"}, {en: "prince"}, 
                {en: "princess"}, {en: "queen"},{en: "angle"}, 
            ],
            where: [
                {en: "bakery"}, {en: "bank"}, {en: "beach"},
                {en: "bookstore"}, {en: "church"}, {en: "factory"},
                {en: "hospital"}, {en: "hotel"}, {en: "museum"},
                {en: "park"}, {en: "airport"}, {en: "train station"},
                {en: "farm"}, {en: "zoo"}, {en: "garden"},
                {en: "kitchen"}, {en: "library"}, {en: "playground"},
                {en: "classroom"}, {en: "castle"}
            ],
            what: [
                {en: "baking"}, {en: "cooking"}, {en: "eating"},
                {en: "climbing"}, {en: "dancing"}, {en: "drawing"},
                {en: "fishing"}, {en: "hiking"}, {en: "jogging"},
                {en: "running"}, {en: "sailing"}, {en: "singing"},
                {en: "skating"}, {en: "skiing"}, {en: "surfing"},
                {en: "swimming"}, {en: "traveling"}, {en: "teaching"},
                {en: "reading"}, {en: "playing"}
            ],
            style: [
                {en: "3D Cartoon", zh: "3D 卡通"}, {en: "Pixar Style", zh: "皮克斯風"},
                {en: "Studio Ghibli Style", zh: "吉卜力風"}, {en: "Pixel Art", zh: "像素遊戲"},
                {en: "Lego Brick Style", zh: "樂高積木"}, {en: "Watercolor Painting", zh: "水彩畫"},
                {en: "Crayon Drawing", zh: "蠟筆畫"}, {en: "Claymation", zh: "黏土動畫"},
                {en: "Kawaii Sticker", zh: "可愛貼紙"}, {en: "Pop Art", zh: "普普藝術"},
                {en: "Paper Cutout", zh: "紙雕剪紙"}, {en: "Oil Painting", zh: "油畫風"},
                {en: "Chalk Art", zh: "粉筆畫"}, {en: "Anime Style", zh: "日系動漫"},
                {en: "Pencil Sketch", zh: "鉛筆素描"}, {en: "Fantasy Magic", zh: "奇幻魔法"},
                {en: "Cyberpunk", zh: "科幻未來"}, {en: "Isometric View", zh: "立體模型"},
                {en: "Felted Wool", zh: "羊毛氈"}, {en: "Glowing Neon", zh: "霓虹發光"}
            ]
        };

        const selections = { who: "", where: "", what: "", style: "" };

        function initDropdowns() {
            Object.keys(data).forEach(cat => {
                const input = document.getElementById(`${cat}-input`);
                const list = document.getElementById(`${cat}-list`);

                input.addEventListener('focus', () => {
                    renderList(cat, input.value);
                    list.classList.add('show');
                });

                input.addEventListener('input', () => {
                    renderList(cat, input.value);
                    selections[cat] = input.value;
                    updatePrompt();
                });

                document.addEventListener('click', (e) => {
                    if (!document.getElementById(`${cat}-container`).contains(e.target)) {
                        list.classList.remove('show');
                    }
                });
            });
        }

        function renderList(cat, filter = "") {
            const list = document.getElementById(`${cat}-list`);
            list.innerHTML = "";
            
            const filtered = data[cat].filter(item => 
                item.en.toLowerCase().includes(filter.toLowerCase()) ||
                (item.zh && item.zh.includes(filter))
            );

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "dropdown-item flex justify-between items-center";
                
                // Style 顯示中文，其他只顯示英文
                if (cat === 'style' && item.zh) {
                    div.innerHTML = `<span class="font-bold">${item.en}</span><span class="text-gray-400 text-sm italic">${item.zh}</span>`;
                } else {
                    div.innerHTML = `<span class="font-bold">${item.en}</span>`;
                }

                div.onclick = () => {
                    document.getElementById(`${cat}-input`).value = item.en;
                    selections[cat] = item.en;
                    document.getElementById(`${cat}-list`).classList.remove('show');
                    updatePrompt();
                };
                list.appendChild(div);
            });
        }

        function updatePrompt() {
            const { who, where, what, style } = selections;
            let promptParts = [];
            
            if (who) promptParts.push(`A ${who}`);
            if (what) promptParts.push(what);
            if (where) promptParts.push(`in the ${where}`);
            if (style) promptParts.push(`, in ${style} style`);

            const finalPrompt = promptParts.join(' ');
            const output = document.getElementById('prompt-output');
            
            if (finalPrompt.trim() === "") {
                output.innerText = "Waiting for magic...";
                output.classList.add('text-gray-300');
            } else {
                output.innerText = finalPrompt + ".";
                output.classList.remove('text-gray-300');
            }
        }

        function copyPrompt() {
            const text = document.getElementById('prompt-output').innerText;
            if (text === "Waiting for magic...") return;

            const tempInput = document.createElement("input");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            showToast();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        function resetAll() {
            Object.keys(selections).forEach(cat => {
                selections[cat] = "";
                document.getElementById(`${cat}-input`).value = "";
            });
            updatePrompt();
        }

        window.onload = initDropdowns;
    </script>
</body>
</html>
